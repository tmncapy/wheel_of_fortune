<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wheel Spin - Multi-Player Realtime Sync</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    width:100vw; height:100vh; overflow:hidden; background:#111827;
    display:flex; align-items:center; justify-content:center; font-family:Arial, sans-serif;
  }
  .app{ display:flex; align-items:center; justify-content:center; }
  .wheel-container{ position:relative; width:820px; height:820px; display:flex; align-items:center; justify-content:center; }
  #wheel {
    width:100%; height:100%; object-fit:contain; user-select:none; pointer-events:none;
    filter:drop-shadow(0 0 30px rgba(0,0,0,0.5)); will-change: transform; transform: translateZ(0);
  }
  .pointer-wrapper {
    position:absolute; bottom: -80px; left: 50%; width: 90px; height: 90px;
    transform: translateX(50%); z-index: 5; pointer-events: none; user-select: none;
  }
  .pointer{ width: 100%; height: 100%; object-fit: contain; transform: rotate(180deg); transform-origin: center top; will-change: transform; }
  .drag-zone { position:absolute; width:100%; height:100%; border-radius:50%; z-index:10; cursor: grab; }
  .drag-zone:active { cursor: grabbing; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="app">
  <div class="wheel-container">
    <div class="pointer-wrapper">
      <img id="pointerImg" class="pointer" src="pointer.png" />
    </div>
    <img id="wheel" src="wheel-template.png" />
    <div class="drag-zone" id="dragZone"></div>
  </div>
</div>

<audio id="spinSound" src="spin.mp3" preload="auto"></audio>

<script>
  // CẤU HÌNH FIREBASE (Phải trùng khớp hoàn toàn với cấu hình ở file tech.html)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  const wheel = document.getElementById("wheel");
  const dragZone = document.getElementById("dragZone");
  const spinSound = document.getElementById("spinSound");
  const pointerImg = document.getElementById("pointerImg");

  let currentRotation = 0;   
  let velocity = 0;          
  let isDragging = false;    
  let isRemoteUpdating = false; // Cờ chặn vòng lặp phản hồi dữ liệu chéo nhau
  let lastAngle = 0;         
  
  let dragAngles = [];
  let dragTimes = [];
  let soundTimeout = null;

  const pinCount = 24;
  const pinAngleStep = 360 / pinCount; 

  // ========================================================
  // KẾT NỐI REALTIME: ĐỒNG BỘ DỮ LIỆU TỪ CLOUD FIREBASE
  // ========================================================
  
  // 1. Đồng bộ mặt nón tức thì
  database.ref('wheelSettings/activeImage').on('value', (snapshot) => {
    const imageName = snapshot.val();
    if (imageName) {
      wheel.src = imageName;
    }
  });

  // 2. Lắng nghe góc quay từ Database đám mây khi có thiết bị tác động quay nón
  database.ref('wheelSettings').on('value', (snapshot) => {
    if (isDragging) return; // Nếu bản thân máy này đang kéo nón thì ưu tiên hành động vuốt tại chỗ
    
    const data = snapshot.val();
    if (data) {
      isRemoteUpdating = true;
      currentRotation = data.rotation || 0;
      velocity = data.velocity || 0;
      
      wheel.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
      updatePointerFlap();
      isRemoteUpdating = false;
    }
  });

  // Hàm đẩy dữ liệu lên đám mây khi bạn thực hiện quay nón trên máy của mình
  function pushPhysicsToCloud() {
    if (isDragging || isRemoteUpdating) return;
    database.ref('wheelSettings/rotation').set(currentRotation);
    database.ref('wheelSettings/velocity').set(velocity);
  }
  // ========================================================

  function getAngle(clientX, clientY) {
    const rect = wheel.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let angle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
    return angle < 0 ? angle + 360 : angle;
  }

  function handleStart(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    isDragging = true;
    velocity = 0; 
    clearTimeout(soundTimeout);
    
    // Đẩy trạng thái dừng nón lên mây ngay lập tức để đồng bộ cho các người chơi khác
    database.ref('wheelSettings/velocity').set(0);

    spinSound.play().then(() => {
      spinSound.pause();
      spinSound.volume = 1.0;
    }).catch(err => console.log(""));
    
    lastAngle = getAngle(clientX, clientY);
    dragAngles = [lastAngle];
    dragTimes = [performance.now()];
  }

  function handleMove(e) {
    if (!isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const currentAngle = getAngle(clientX, clientY);
    let deltaAngle = currentAngle - lastAngle;

    if (deltaAngle > 180) deltaAngle -= 360;
    if (deltaAngle < -180) deltaAngle += 360;

    currentRotation += deltaAngle;
    wheel.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
    
    updatePointerFlap();
    
    // Gửi dữ liệu góc quay thời gian thực lên mây khi đang dùng tay kéo quay nón
    database.ref('wheelSettings/rotation').set(currentRotation);

    lastAngle = currentAngle;

    const now = performance.now();
    dragAngles.push(currentAngle);
    dragTimes.push(now);
    
    while (dragTimes.length > 1 && now - dragTimes[0] > 100) {
      dragAngles.shift();
      dragTimes.shift();
    }
  }

  function handleEnd() {
    if (!isDragging) return;
    isDragging = false;

    if (dragTimes.length > 1) {
      const firstTime = dragTimes[0];
      const lastTime = dragTimes[dragTimes.length - 1];
      const timeDiff = lastTime - firstTime;

      if (timeDiff > 0) {
        let totalDelta = 0;
        for (let i = 1; i < dragAngles.length; i++) {
          let diff = dragAngles[i] - dragAngles[i - 1];
          if (diff > 180) diff -= 360;
          if (diff < -180) diff += 360;
          totalDelta += diff;
        }
        velocity = (totalDelta / timeDiff) * 28; 
      }
    }

    // Đẩy thông số vận tốc cuối lên mây để máy của người xem tự tính toán lực trượt theo
    pushPhysicsToCloud();

    clearTimeout(soundTimeout); 
    if (Math.abs(velocity) > 2) {
      soundTimeout = setTimeout(() => {
        if (Math.abs(velocity) > 0.1) {
          spinSound.currentTime = 0;
          spinSound.play().catch(e => {});
        }
      }, 1000); 
    }
  }

  dragZone.addEventListener("mousedown", handleStart);
  window.addEventListener("mousemove", handleMove);
  window.addEventListener("mouseup", handleEnd);

  dragZone.addEventListener("touchstart", handleStart, { passive: true });
  window.addEventListener("touchmove", handleMove, { passive: false });
  window.addEventListener("touchend", handleEnd);

  function updatePointerFlap() {
    let normalizedRotation = currentRotation % 360;
    if (normalizedRotation < 0) normalizedRotation += 360;

    let remainder = normalizedRotation % pinAngleStep;
    if (remainder > pinAngleStep / 2) {
      remainder -= pinAngleStep;
    }

    let pointerAngleOffset = 0;
    const contactZone = 6; 

    if (Math.abs(remainder) < contactZone) {
      let pushIntensity = (contactZone - Math.abs(remainder)) / contactZone;
      pointerAngleOffset = remainder * pushIntensity * 2.2; 
    }

    pointerAngleOffset = Math.max(-22, Math.min(22, pointerAngleOffset));
    pointerImg.style.transform = `rotate(${180 + pointerAngleOffset}deg)`;
  }

  const friction = 0.997; 

  function updatePhysics() {
    // Chỉ chạy cập nhật vật lý tự sinh nếu không bị can thiệp kéo từ máy từ xa
    if (!isDragging && Math.abs(velocity) > 0.04) {
      currentRotation += velocity;
      wheel.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
      updatePointerFlap();
      velocity *= friction;
      
      // Định kỳ cập nhật góc giảm tốc để các máy khác đồng bộ độ mượt một cách chính xác
      if(Math.floor(currentRotation) % 3 === 0) {
         pushPhysicsToCloud();
      }
    } else if (!isDragging && velocity !== 0) {
      velocity = 0;
      spinSound.pause();
      pointerImg.style.transform = `rotate(180deg)`;
      pushPhysicsToCloud();
    }
    requestAnimationFrame(updatePhysics);
  }

  requestAnimationFrame(updatePhysics);
</script>
</body>
</html>
