<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player 1 - Wheel Spin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url('bg.png') no-repeat center center/120% auto;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wheel-container {
      position: relative;
      width: 820px;
      height: 820px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #wheel {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.5));
      will-change: transform;
      transform: translateZ(0);
    }

    .pointer-wrapper {
      position: absolute;
      bottom: -80px;
      left: 50%;
      width: 90px;
      height: 90px;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      user-select: none;
    }

    .pointer {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: rotate(180deg);
      transform-origin: center top;
      will-change: transform;
    }

    .drag-zone {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      z-index: 10;
      cursor: grab;
    }

    .drag-zone:active {
      cursor: grabbing;
    }

    .audio-init-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .audio-init-overlay button {
      background: #39ff14;
      color: black;
      border: none;
      padding: 25px 50px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 25px #39ff14;
      transition: transform 0.2s;
    }

    /* Giao diện thông báo khi bị khóa quyền quay */
    .lock-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #ff3b30;
      text-shadow: 0 2px 8px black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lock-overlay.active {
      opacity: 1;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
</head>

<body>

  <div id="audioOverlay" class="audio-init-overlay">
    <button onclick="activateAudioStream()">PLAYER 1: BẤM VÀO ĐÂY ĐỂ CHO PHÉP ÂM THANH</button>
  </div>

  <div class="app">
    <div class="wheel-container">
      <div class="pointer-wrapper">
        <img id="pointerImg" class="pointer" src="pointer.png" />
      </div>
      <img id="wheel" src="wheel-template.png" />
      <div class="drag-zone" id="dragZone">
        <div id="lockOverlay" class="lock-overlay">BẠN ĐANG BỊ KHÓA</div>
      </div>
    </div>
  </div>

  <audio id="spinSound" src="spin.mp3" preload="auto" loop></audio>

  <script>
    // Định danh kiểm tra quyền của Player 1
    const MY_PLAYER_ID = "p1";

    const SERVER_URL = "https://wheel2001.onrender.com";
    const socket = io(SERVER_URL);

    const wheel = document.getElementById("wheel");
    const dragZone = document.getElementById("dragZone");
    const spinSound = document.getElementById("spinSound");
    const pointerImg = document.getElementById("pointerImg");
    const audioOverlay = document.getElementById("audioOverlay");
    const lockOverlay = document.getElementById("lockOverlay");

    let baseRotation = 0;
    let initVelocity = 0;
    let spinStartTime = 0;
    let isSpinningFree = false;

    let currentRotation = 0;
    let isDragging = false;
    let lastAngle = 0;
    let isDraggingByMe = false;
    let dragTrack = [];

    const pinCount = 24;
    const pinAngleStep = 360 / pinCount;

    const frictionPerMs = Math.pow(0.995, 1 / 16.67);
    const lnFriction = Math.log(frictionPerMs);

    let isSystemActivated = false;
    let isSoundPlaying = false;
    let hasControlTurn = false; // Cờ kiểm soát quyền tương tác xoay nón

    function activateAudioStream() {
      isSystemActivated = true;
      audioOverlay.style.display = "none";
      spinSound.volume = 0;
      spinSound.play().catch(e => console.log("Lỗi âm thanh:", e));
    }

    // ========================================================
    // ĐỒNG BỘ REALTIME & XỬ LÝ PHÂN QUYỀN
    // ========================================================

    socket.on('initGameState', (state) => {
      if (state.activeImage) wheel.src = state.activeImage;
      checkAndApplyTurnPermission(state.currentPlayerTurn);
      parseServerPhysics(state);
    });

    socket.on('playerUpdateImage', (imageName) => {
      if (imageName) wheel.src = imageName;
    });

    socket.on('serverUpdateTurn', (activePlayerId) => {
      checkAndApplyTurnPermission(activePlayerId);
    });

    socket.on('playerSyncPhysics', (data) => {
      if (isDraggingByMe) return;
      parseServerPhysics(data);
    });

    function checkAndApplyTurnPermission(activePlayerId) {
      if (activePlayerId === MY_PLAYER_ID) {
        hasControlTurn = true;
        lockOverlay.classList.remove('active');
        dragZone.style.cursor = "grab";
      } else {
        hasControlTurn = false;
        lockOverlay.classList.add('active');
        dragZone.style.cursor = "not-allowed";

        // Thả tay ép buộc nếu đang kéo nón mà bị Tech khóa quyền đột ngột
        if (isDraggingByMe) {
          isDragging = false;
          isDraggingByMe = false;
        }
      }
    }

    function parseServerPhysics(data) {
      if (data.spinStartTime) {
        baseRotation = data.baseRotation || data.rotation || 0;
        initVelocity = data.initVelocity || data.velocity || 0;
        spinStartTime = data.spinStartTime;
        isSpinningFree = true;
        isDragging = false;
      } else {
        currentRotation = data.rotation || 0;
        initVelocity = data.velocity || 0;
        isSpinningFree = false;
        isDragging = !!data.isDraggingSync;

        if (!isDragging && data.velocity === 0) {
          spinStartTime = 0;
        }
      }
    }

    function calculateCurrentPhysics() {
      if (!isSpinningFree) return { r: currentRotation, v: 0 };

      const t = Date.now() - spinStartTime;
      if (t <= 0) return { r: baseRotation, v: initVelocity };

      const currentV = initVelocity * Math.pow(frictionPerMs, t);

      if (Math.abs(currentV) <= 0.04) {
        isSpinningFree = false;
        spinStartTime = 0;
        return { r: currentRotation, v: 0 };
      }

      const deltaRotation = (initVelocity / lnFriction) * (Math.pow(frictionPerMs, t) - 1) * (1 / 16.67);
      return { r: baseRotation + deltaRotation, v: currentV };
    }

    function manageSoundSafelyBackground() {
      if (!isSystemActivated) return;

      let totalVelocityNow = isSpinningFree ? calculateCurrentPhysics().v : (isDragging ? 10 : 0);

      if (totalVelocityNow > 0.04 || isDragging) {
        if (isSpinningFree && spinStartTime > 0) {
          const elapsed = Date.now() - spinStartTime;

          if (elapsed >= 1000) {
            if (!isSoundPlaying) {
              isSoundPlaying = true;
              spinSound.currentTime = 0;
              spinSound.volume = 1;
            }
          } else {
            if (spinSound.volume !== 0) spinSound.volume = 0;
          }
        } else {
          if (spinSound.volume !== 0) spinSound.volume = 0;
        }
      } else {
        if (spinSound.volume !== 0 || isSoundPlaying) {
          spinSound.volume = 0;
          spinSound.currentTime = 0;
          isSoundPlaying = false;
        }
      }
    }

    setInterval(manageSoundSafelyBackground, 30);

    function getAngle(clientX, clientY) {
      const wheelRect = wheel.getBoundingClientRect();
      const centerX = wheelRect.left + wheelRect.width / 2;
      const centerY = wheelRect.top + wheelRect.height / 2;
      let angle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
      return angle < 0 ? angle + 360 : angle;
    }

    function handleStart(e) {
      if (!isSystemActivated) return;
      if (!hasControlTurn) return; // CHẶN CHUỘT: Nếu chưa được Tech cấp lượt thì không cho click giữ

      let currentV = isSpinningFree ? calculateCurrentPhysics().v : 0;
      if (Math.abs(currentV) > 0.04) return;

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      isDragging = true;
      isDraggingByMe = true;
      isSpinningFree = false;
      spinStartTime = 0;
      isSoundPlaying = false;

      lastAngle = getAngle(clientX, clientY);
      dragTrack = [{ angle: lastAngle, time: Date.now() }];

      socket.emit('playerMoveWheel', { rotation: currentRotation, velocity: 0, isDraggingSync: true });
    }

    function handleMove(e) {
      if (!isDragging || !isDraggingByMe || !hasControlTurn) return;

      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const currentAngle = getAngle(clientX, clientY);
      let deltaAngle = currentAngle - lastAngle;

      if (deltaAngle > 180) deltaAngle -= 360;
      if (deltaAngle < -180) deltaAngle += 360;

      currentRotation += deltaAngle;
      lastAngle = currentAngle;

      const now = Date.now();
      dragTrack.push({ angle: currentAngle, time: now });

      while (dragTrack.length > 0 && now - dragTrack[0].time > 100) {
        dragTrack.shift();
      }

      socket.emit('playerMoveWheel', { rotation: currentRotation, velocity: 0, isDraggingSync: true });
    }

    function handleEnd() {
      if (!isDragging || !isDraggingByMe) return;
      isDragging = false;

      let calculatedVelocity = 0;
      const now = Date.now();

      while (dragTrack.length > 0 && now - dragTrack[0].time > 100) {
        dragTrack.shift();
      }

      if (dragTrack.length >= 2) {
        const first = dragTrack[0];
        const last = dragTrack[dragTrack.length - 1];
        const timeDiff = last.time - first.time;

        if (timeDiff > 0) {
          let totalDelta = 0;
          for (let i = 1; i < dragTrack.length; i++) {
            let diff = dragTrack[i].angle - dragTrack[i - 1].angle;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            totalDelta += diff;
          }
          calculatedVelocity = (totalDelta / timeDiff) * 15;
        }
      }

      const maxVel = 25;
      if (calculatedVelocity > maxVel) calculatedVelocity = maxVel;
      if (calculatedVelocity < -maxVel) calculatedVelocity = -maxVel;

      if (Math.abs(calculatedVelocity) > 0.1 && hasControlTurn) {
        baseRotation = currentRotation;
        initVelocity = calculatedVelocity;
        spinStartTime = Date.now();
        isSpinningFree = true;
        isSoundPlaying = false;

        socket.emit('playerMoveWheel', {
          baseRotation: baseRotation,
          initVelocity: initVelocity,
          spinStartTime: spinStartTime
        });
      } else {
        isDraggingByMe = false;
        spinStartTime = 0;
        isSoundPlaying = false;
        socket.emit('playerStopWheel', { rotation: currentRotation });
      }
    }

    dragZone.addEventListener("mousedown", handleStart);
    window.addEventListener("mousemove", handleMove);
    window.addEventListener("mouseup", handleEnd);

    dragZone.addEventListener("touchstart", handleStart, { passive: true });
    window.addEventListener("touchmove", handleMove, { passive: false });
    window.addEventListener("touchend", handleEnd);

    function updatePointerFlap(rotationValue) {
      let normalizedRotation = rotationValue % 360;
      if (normalizedRotation < 0) normalizedRotation += 360;

      let remainder = normalizedRotation % pinAngleStep;
      if (remainder > pinAngleStep / 2) {
        remainder -= pinAngleStep;
      }

      let pointerAngleOffset = 0;
      const contactZone = 6;

      if (Math.abs(remainder) < contactZone) {
        let pushIntensity = (contactZone - Math.abs(remainder)) / contactZone;
        pointerAngleOffset = -Math.abs(remainder * pushIntensity * 6.0);
      }

      pointerAngleOffset = Math.max(-25, Math.min(0, pointerAngleOffset));
      pointerImg.style.transform = `rotate(${180 + pointerAngleOffset}deg)`;
    }

    function renderLoop() {
      const state = calculateCurrentPhysics();
      if (isSpinningFree) {
        currentRotation = state.r;
      }

      wheel.style.transform = `rotate(${currentRotation.toFixed(2)}deg) translateZ(0)`;
      updatePointerFlap(currentRotation);

      if (isDraggingByMe && isSpinningFree === false && state.v === 0 && !isDragging) {
        isDraggingByMe = false;
        spinStartTime = 0;
        isSoundPlaying = false;
        socket.emit('playerStopWheel', { rotation: currentRotation });
      }

      requestAnimationFrame(renderLoop);
    }

    requestAnimationFrame(renderLoop);
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.keyCode === 123) e.preventDefault();
      if ((e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
      }
    });
  </script>
</body>

</html>
