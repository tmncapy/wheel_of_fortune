<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wheel Spin - Web Tech Realtime Control</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1e293b;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  h1 { margin-bottom: 30px; color: #38bdf8; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
  .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 600px; width: 90%; }
  .btn-change {
    background: #0f172a; color: #f8fafc; border: 2px solid #38bdf8; padding: 25px 15px;
    font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; text-align: center;
  }
  .btn-change:hover { background: #38bdf8; color: #0f172a; transform: translateY(-3px); }
  .status-text { margin-top: 30px; font-size: 16px; color: #94a3b8; }
  .btn-reset {
    margin-top: 20px; background: #ef4444; color: white; border: none; padding: 12px 25px;
    font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer;
  }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

  <h1>BẢNG ĐIỀU KHIỂN WEB TECH REALTIME</h1>
  
  <div class="grid-container">
    <button class="btn-change" onclick="changeWheelImage('vong1.png')">Mặt Nón 1</button>
    <button class="btn-change" onclick="changeWheelImage('vong2.png')">Mặt Nón 2</button>
    <button class="btn-change" onclick="changeWheelImage('vong3.png')">Mặt Nón 3</button>
    <button class="btn-change" onclick="changeWheelImage('vong4.png')">Mặt Nón 4</button>
    <button class="btn-change" onclick="changeWheelImage('vong5.png')">Mặt Nón 5</button>
    <button class="btn-change" onclick="changeWheelImage('vong6.png')">Mặt Nón 6</button>
  </div>

  <button class="btn-reset" onclick="resetWheelPosition()">Đưa nón về góc 0</button>

  <p class="status-text" id="status">Đang kết nối tới hệ thống đám mây Firebase...</p>

<script>
  // CẤU HÌNH FIREBASE CỦA BẠN (Thay thế bằng thông tin của bạn)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_ID",
    appId: "YOUR_APP_ID"
  };

  // Khởi tạo Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  document.getElementById('status').innerText = "Hệ thống đám mây sẵn sàng!";

  // Hàm đổi mặt nón đồng bộ toàn cầu
  function changeWheelImage(imageName) {
    database.ref('wheelSettings/activeImage').set(imageName);
    document.getElementById('status').innerText = `Đã cập nhật Mặt Nón: ${imageName}`;
    document.getElementById('status').style.color = '#34d399';
  }

  // Hàm đặt lại góc quay về vị trí ban đầu cho tất cả mọi người
  function resetWheelPosition() {
    database.ref('wheelSettings/rotation').set(0);
    database.ref('wheelSettings/velocity').set(0);
    document.getElementById('status').innerText = `Đã đưa nón của tất cả mọi người về góc số 0!`;
    document.getElementById('status').style.color = '#f59e0b';
  }
</script>
</body>
</html>
